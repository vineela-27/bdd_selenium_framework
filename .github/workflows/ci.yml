name: BDD Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install webdriver-manager behave-html-formatter

    # ✅ Install Chrome + Driver automatically
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # ✅ Install Allure CLI
    - name: Install Allure
      run: |
        sudo apt-get update
        sudo apt-get install -y allure

    - name: Run Tests (BDD + HTML)
      run: |
        mkdir -p reports
        behave -f html -o reports/test_report.html --no-capture

    - name: Generate Allure Report
      if: always()
      run: |
        allure generate reports/ -o reports/allure-report --clean

    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: reports/

    - name: Upload HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: html-report
        path: reports/test_report.html

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: reports/screenshots/
