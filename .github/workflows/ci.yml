name: BDD Selenium Tests (HTML Only)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install behave-html-formatter webdriver-manager

    # ✅ Setup Chrome (includes driver)
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # ✅ Run Tests (HTML report only)
    - name: Run Tests
      run: |
        mkdir -p reports
        behave \
          -f pretty \
          -f html -o reports/test_report.html \
          --no-capture

    # ✅ Upload HTML Report
    - name: Upload HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: html-report
        path: reports/test_report.html

    # ✅ Upload Screenshots (if any)
    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: reports/screenshots/
