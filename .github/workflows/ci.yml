name: BDD Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install behave-html-formatter webdriver-manager allure-behave

    # ✅ Setup Chrome (includes compatible ChromeDriver)
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1

    # ✅ Install Allure CLI
    - name: Install Allure
      run: |
        sudo apt-get update
        sudo apt-get install -y allure

    # ✅ Run BDD Tests (HTML + Allure)
    - name: Run Tests
      run: |
        mkdir -p reports
        behave \
          -f pretty \
          -f html -o reports/test_report.html \
          -f allure_behave.formatter:AllureFormatter -o reports/allure-results \
          --no-capture

    # ✅ Generate Allure Report
    - name: Generate Allure Report
      if: always()
      run: |
        allure generate reports/allure-results -o reports/allure-report --clean

    # ✅ Upload Allure Results
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: reports/allure-results

    # ✅ Upload Allure HTML Report
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: reports/allure-report

    # ✅ Upload HTML Report
    - name: Upload HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: html-report
        path: reports/test_report.html

    # ✅ Upload Screenshots
    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: reports/screenshots/
